<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0C0C0C;

    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Vazirmatn, sans-serif;

    border-radius: 999px;

</head>
<body>
  <div class="wrap">
    <h1>You're offline</h1>
